<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mini-coder · AI 助手</title>
<style>
  :root {
    --bg: #1a1a2e;
    --sidebar-bg: #16213e;
    --chat-bg: #0f3460;
    --user-bubble: #e94560;
    --assistant-bubble: #1a1a40;
    --text: #eaeaea;
    --text-muted: #8899aa;
    --border: #2a2a4a;
    --input-bg: #16213e;
    --hover: #1f3460;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }

  /* 侧边栏 */
  .sidebar {
    width: 280px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
  }

  .sidebar-header .logo {
    width: 32px; height: 32px;
    background: var(--user-bubble);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white;
  }

  .new-chat-btn {
    margin: 12px;
    padding: 10px 16px;
    background: var(--user-bubble);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .new-chat-btn:hover { opacity: 0.85; }

  .conversation-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .conv-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s;
  }

  .conv-item:hover { background: var(--hover); color: var(--text); }
  .conv-item.active { background: var(--hover); color: var(--text); }

  .status-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }

  /* 主聊天区 */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-height: 100vh;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    gap: 12px;
    max-width: 80%;
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .message-avatar {
    width: 32px; height: 32px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }

  .message.user .message-avatar { background: #e94560; color: white; }
  .message.assistant .message-avatar { background: #4a6fa5; color: white; }

  .message-content {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .message-content {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message.assistant .message-content {
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message.thinking .message-content {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    font-style: italic;
  }

  /* 输入区 */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--input-bg);
    border-radius: 12px;
    padding: 8px 12px;
    align-items: flex-end;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--user-bubble); }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 150px;
    font-family: inherit;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none;
    background: var(--user-bubble);
    color: white;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }

  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">M</div>
    <span>mini-coder</span>
  </div>
  <button class="new-chat-btn" onclick="newConversation()">+ 新建对话</button>
  <div class="conversation-list" id="conversationList"></div>
  <div class="status-bar">
    <span class="status-dot"></span>
    <span>API 已就绪</span>
  </div>
</div>

<div class="main">
  <div class="chat-header" id="chatHeader">新建对话</div>
  <div class="chat-messages" id="chatMessages">
    <div class="empty-state">
      输入消息开始对话
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="messageInput"
        placeholder="输入消息，按 Enter 发送，Shift+Enter 换行..."
        rows="1"
        onkeydown="handleKeyDown(event)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
const API = '/chat';
let conversationId = null;
let isProcessing = false;

const chatMessages = document.getElementById('chatMessages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const chatHeader = document.getElementById('chatHeader');
const conversationList = document.getElementById('conversationList');

// 侧边栏对话列表（存在 localStorage）
const savedConversations = JSON.parse(localStorage.getItem('mini_coder_conversations') || '[]');

function renderConversationList() {
  if (savedConversations.length === 0) {
    conversationList.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--text-muted)">暂无历史对话</div>';
    return;
  }
  conversationList.innerHTML = savedConversations.map(c =>
    `<div class="conv-item${c.id === conversationId ? ' active' : ''}" onclick="switchConversation(${c.id})">
      ${c.title || '新对话'}
    </div>`
  ).join('');
}

function switchConversation(id) {
  conversationId = id;
  const conv = savedConversations.find(c => c.id === id);
  chatHeader.textContent = conv?.title || '对话 ' + id;
  chatMessages.innerHTML = '<div class="empty-state">加载中...</div>';
  renderConversationList();
  fetch(`/history/${id}`)
    .then(r => r.json())
    .then(data => {
      chatMessages.innerHTML = '';
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(m => addMessage(m.role, m.content));
      } else {
        chatMessages.innerHTML = '<div class="empty-state">开始对话吧</div>';
      }
      scrollToBottom();
    })
    .catch(() => {
      chatMessages.innerHTML = '<div class="empty-state">加载失败，请刷新</div>';
    });
}

function newConversation() {
  conversationId = null;
  chatHeader.textContent = '新建对话';
  chatMessages.innerHTML = '<div class="empty-state">输入消息开始对话</div>';
  renderConversationList();
  messageInput.focus();
}

function saveConversation(id, title) {
  const existing = savedConversations.findIndex(c => c.id === id);
  if (existing >= 0) {
    savedConversations[existing].title = title || savedConversations[existing].title;
  } else {
    savedConversations.unshift({ id, title: title || '对话 ' + id });
    if (savedConversations.length > 20) savedConversations.pop();
  }
  localStorage.setItem('mini_coder_conversations', JSON.stringify(savedConversations));
  renderConversationList();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addMessage(role, content) {
  if (chatMessages.querySelector('.empty-state')) {
    chatMessages.innerHTML = '';
  }

  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `message ${isUser ? 'user' : 'assistant'}`;
  div.innerHTML = `
    <div class="message-avatar">${isUser ? 'U' : 'AI'}</div>
    <div class="message-content">${escapeHtml(content)}</div>
  `;
  chatMessages.appendChild(div);
  scrollToBottom();
}

function addThinkingMessage() {
  if (chatMessages.querySelector('.empty-state')) {
    chatMessages.innerHTML = '';
  }
  const div = document.createElement('div');
  div.className = 'message assistant thinking';
  div.id = 'thinkingMessage';
  div.innerHTML = `
    <div class="message-avatar">AI</div>
    <div class="message-content">思考中...</div>
  `;
  chatMessages.appendChild(div);
  scrollToBottom();
}

function removeThinkingMessage() {
  const el = document.getElementById('thinkingMessage');
  if (el) el.remove();
}

function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function setProcessing(processing) {
  isProcessing = processing;
  messageInput.disabled = processing;
  sendBtn.disabled = processing;
  if (!processing) messageInput.focus();
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || isProcessing) return;

  messageInput.value = '';
  setProcessing(true);

  addMessage('user', text);
  addThinkingMessage();

  try {
    const body = { message: text };
    if (conversationId) body.conversation_id = conversationId;

    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await resp.json();
    removeThinkingMessage();

    if (resp.status === 429) {
      addMessage('assistant', data.detail || '请求太频繁，请稍后再试。');
      return;
    }

    if (resp.ok) {
      if (!conversationId && data.conversation_id) {
        conversationId = data.conversation_id;
        chatHeader.textContent = '对话 ' + conversationId;
        saveConversation(conversationId, text.slice(0, 30));
      }
      addMessage('assistant', data.reply || '(无回复)');
    } else {
      addMessage('assistant', '错误: ' + (data.detail || '服务器内部错误'));
    }
  } catch (err) {
    removeThinkingMessage();
    addMessage('assistant', '网络错误: ' + err.message);
  } finally {
    setProcessing(false);
  }
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// 启动
renderConversationList();
messageInput.focus();
</script>
</body>
</html>
